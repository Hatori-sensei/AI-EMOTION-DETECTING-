<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 멘탈케어 타이머</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Pretendard', sans-serif; 
            background-color: #121212; 
            color: #fff; 
        }
        #app { 
            display: flex; 
            height: 100vh; 
            flex-direction: column; 
        }
        @media (min-width: 768px) { 
            #app { flex-direction: row; } 
        }
        .cam-section, .ui-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box;
        }
        .cam-section { background-color: #1e1e1e; border-right: 1px solid #333; }
        .ui-section { background-color: #2c2c2c; }
        
        video { 
            width: 100%; 
            max-width: 400px; 
            border-radius: 16px; 
            transform: scaleX(-1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 20px;
            display: none; 
        }
        .timer-display {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            color: #fff;
            display: none; 
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            display: none; 
        }
        button { 
            padding: 14px 28px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 10px; 
            background: #fff; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        button.stop-btn { background: #ff4757; color: white; }
        
        #start-app-btn {
            padding: 20px 40px;
            font-size: 22px;
            background: #1dd1a1;
            color: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(29, 209, 161, 0.4);
        }

        .status-card {
            background: #444;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .current-emotion {
            font-size: 28px;
            font-weight: bold;
            color: #1dd1a1;
            margin-top: 10px;
        }
        #log-container {
            width: 100%;
            max-width: 380px;
            height: 250px;
            overflow-y: auto;
            background: #333;
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
        }
        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #555;
            font-size: 15px;
        }
        .log-entry:last-child { border-bottom: none; }
    </style>
</head>
<body>
<div id="app">
    <div class="cam-section">
        <button id="start-app-btn" onclick="initApp()">카메라 및 AI 시작하기</button>
        <video id="webcam" playsinline autoplay muted></video>
        <div class="timer-display" id="timer">00:00</div>
        <div class="btn-group" id="controls">
            <button onclick="startSession()">▶ 집중 시작</button>
            <button class="stop-btn" onclick="stopSession()">■ 세션 종료</button>
        </div>
    </div>
    <div class="ui-section">
        <div class="status-card">
            <div style="color:#aaa; font-size:14px;">현재 가장 높은 감정</div>
            <div class="current-emotion" id="top-emotion">대기 중...</div>
        </div>
        <div style="width:100%; max-width:380px; margin-bottom:10px; font-weight:bold; font-size:18px;">나의 집중 & 감정 기록</div>
        <div id="log-container"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
    const URL = "https://teachablemachine.withgoogle.com/models/Z_S8oRbeo/";
    let model, maxPredictions;
    let isRunning = false;
    let startTime;
    let timerInterval;
    let emotionCounts = {};

    window.onload = () => {
        loadLogs();
    };

    async function initApp() {
        const startBtn = document.getElementById('start-app-btn');
        startBtn.innerText = "카메라 연결 중...";
        startBtn.disabled = true;

        const video = document.getElementById('webcam');

        try {
            // 해결 지점: 무거운 AI 모델 로딩 전에 카메라 권한을 '최우선'으로 요청하도록 순서 변경
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                
                // 카메라 화면이 준비될 때까지 대기
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });

                // 카메라가 켜지면 UI를 교체하고 그제서야 AI 모델을 백그라운드에서 다운로드 시작
                startBtn.style.display = 'none';
                video.style.display = 'block';
                document.getElementById('top-emotion').innerText = "AI 모델 다운로드 중...";

                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                
                // 모델 로딩 완료 시 타이머 컨트롤 UI 표시 및 감지 루프 시작
                document.getElementById('timer').style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
                document.getElementById('top-emotion').innerText = "분석 시작";
                
                window.requestAnimationFrame(loop);
            } else {
                alert("카메라를 지원하지 않는 기기입니다.");
                startBtn.innerText = "카메라 및 AI 시작하기";
                startBtn.disabled = false;
            }
        } catch (error) {
            console.error(error);
            alert("카메라 권한 거부 또는 에러: " + error.message);
            startBtn.innerText = "카메라 및 AI 시작하기";
            startBtn.disabled = false;
        }
    }

    async function loop() {
        const video = document.getElementById('webcam');
        if (video.readyState >= 2) { 
            const prediction = await model.predict(video);
            let highestProb = 0;
            let topEmotionName = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    topEmotionName = prediction[i].className;
                }
            }
            
            document.getElementById('top-emotion').innerText = `${topEmotionName} (${(highestProb * 100).toFixed(0)}%)`;
            
            if (isRunning) {
                emotionCounts[topEmotionName] = (emotionCounts[topEmotionName] || 0) + 1;
            }
        }
        window.requestAnimationFrame(loop);
    }

    function startSession() {
        if (isRunning) return;
        isRunning = true;
        emotionCounts = {};
        startTime = Date.now();
        
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const secs = String(elapsed % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }, 1000);
    }

    function stopSession() {
        if (!isRunning) return;
        isRunning = false;
        clearInterval(timerInterval);
        
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const secs = String(elapsed % 60).padStart(2, '0');
        const duration = `${mins}:${secs}`;
        
        let dominantEmotion = "측정 불가";
        let maxCount = 0;
        
        for (const [emotion, count] of Object.entries(emotionCounts)) {
            if (count > maxCount) {
                maxCount = count;
                dominantEmotion = emotion;
            }
        }

        const now = new Date();
        const dateString = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        
        saveLog(dateString, duration, dominantEmotion);
        document.getElementById('timer').innerText = "00:00";
    }

    function saveLog(date, duration, emotion) {
        let logs = JSON.parse(localStorage.getItem('emotionLogs')) || [];
        logs.unshift({ date, duration, emotion });
        localStorage.setItem('emotionLogs', JSON.stringify(logs));
        loadLogs();
    }

    function loadLogs() {
        const logs = JSON.parse(localStorage.getItem('emotionLogs')) || [];
        const container = document.getElementById('log-container');
        container.innerHTML = '';
        logs.forEach(log => {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span>📅 ${log.date}</span> <span>⏱ ${log.duration} | 🧠 ${log.emotion}</span>`;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
