 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 멘탈케어 타이머</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Pretendard', sans-serif; 
            background-color: #121212; 
            color: #fff; 
        }
        #app { 
            display: flex; 
            height: 100vh; 
            flex-direction: column; 
        }
        @media (min-width: 768px) { 
            #app { flex-direction: row; } 
        }
        .cam-section, .ui-section { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box;
        }
        .cam-section { background-color: #1e1e1e; border-right: 1px solid #333; }
        .ui-section { background-color: #2c2c2c; }
        
        video { 
            width: 100%; 
            max-width: 400px; 
            border-radius: 16px; 
            transform: scaleX(-1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 20px;
            display: none; /* 시작 버튼을 누르기 전엔 숨김 */
        }
        .timer-display {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
            color: #fff;
            display: none; /* 시작 버튼을 누르기 전엔 숨김 */
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            display: none; /* 시작 버튼을 누르기 전엔 숨김 */
        }
        button { 
            padding: 14px 28px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 10px; 
            background: #fff; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        button.stop-btn { background: #ff4757; color: white; }
        
        /* 최초 앱 시작용 대형 버튼 */
        #start-app-btn {
            padding: 20px 40px;
            font-size: 22px;
            background: #1dd1a1;
            color: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(29, 209, 161, 0.4);
        }

        .status-card {
            background: #444;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .current-emotion {
            font-size: 28px;
            font-weight: bold;
            color: #1dd1a1;
            margin-top: 10px;
        }
        #log-container {
            width: 100%;
            max-width: 380px;
            height: 250px;
            overflow-y: auto;
            background: #333;
            border-radius: 16px;
            padding: 15px;
            box-sizing: border-box;
        }
        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #555;
            font-size: 15px;
        }
        .log-entry:last-child { border-bottom: none; }
    </style>
</head>
<body>
<div id="app">
    <div class="cam-section">
        <button id="start-app-btn" onclick="initApp()">카메라 및 AI 시작하기</button>
        <video id="webcam" playsinline autoplay muted></video>
        <div class="timer-display" id="timer">00:00</div>
        <div class="btn-group" id="controls">
            <button onclick="startSession()">▶ 집중 시작</button>
            <button class="stop-btn" onclick="stopSession()">■ 세션 종료</button>
        </div>
    </div>
    <div class="ui-section">
        <div class="status-card">
            <div style="color:#aaa; font-size:14px;">현재 가장 높은 감정</div>
            <div class="current-emotion" id="top-emotion">대기 중...</div>
        </div>
        <div style="width:100%; max-width:380px; margin-bottom:10px; font-weight:bold; font-size:18px;">나의 집중 & 감정 기록</div>
        <div id="log-container"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
